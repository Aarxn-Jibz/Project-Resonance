name: Sync with parent repo main

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:   # allows manual run from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push changes

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # CRITICAL: fetches all history so merge succeeds

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream (parent) remote
        run: |
          git remote add upstream https://github.com/joel-dsilva/Project-Resonance.git
          git fetch upstream main

      - name: Merge upstream/main into your branch
        run: |
          # Replace 'main' with your branch name if different
          git checkout main
          git merge upstream/main --no-edit

      - name: Push changes
        # Replace 'main' with your branch name if different
        run: git push origin main
